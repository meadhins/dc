<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Salawat</title>

<style>
:root{
  --bg: linear-gradient(135deg,#f8fafc,#eef6ff,#f8fafc);
  --text:#0f172a;
  --muted:#64748b;

  --card:#ffffff;
  --shadow:0 8px 30px rgba(0,0,0,.06);

  --accent:#2563eb;
  --accent-soft:rgba(37,99,235,.15);

  --font: system-ui, sans-serif;
}

body{
  margin:0;
  padding:20px;
  max-width:700px;
  margin:auto;
  font-family:var(--font);
  background:var(--bg);
  background-size:400% 400%;
  animation:bg 40s ease infinite;
  color:var(--text);
}

@keyframes bg{
  from{background-position:0 50%}
  to{background-position:100% 50%}
}

.card{
  background:var(--card);
  border-radius:24px;
  padding:16px;
  margin:14px 0;
  box-shadow:var(--shadow);
}

.title{
  font-weight:700;
  letter-spacing:.08em;
  color:var(--muted);
  font-size:.85rem;
}

.count{
  font-size:3rem;
  font-weight:700;
  margin:6px 0 10px;
}

.buttons{
  display:flex;
  gap:10px;
}

button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:14px;
  font-size:1rem;
  font-weight:600;
  background:var(--accent);
  color:white;
}

button:active{
  transform:scale(0.98);
}

.footer{
  margin-top:18px;
  text-align:center;
  font-size:.8rem;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="card">
  <div class="title">SALAWAT</div>
  <div id="salawat" class="count">0</div>
  <div class="buttons">
    <button onclick="add('salawat',5)">+5</button>
    <button onclick="add('salawat',10)">+10</button>
    <button onclick="add('salawat',20)">+20</button>
  </div>
</div>

<div class="card">
  <div class="title">ISTIGHFAR</div>
  <div id="istighfar" class="count">0</div>
  <div class="buttons">
    <button onclick="add('istighfar',5)">+5</button>
    <button onclick="add('istighfar',10)">+10</button>
    <button onclick="add('istighfar',20)">+20</button>
  </div>
</div>

<div class="footer">
  Resets daily at 10:00 AM
</div>
  
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
<script>
const RESET_HOUR = 10;

function todayKey(){
  return "dhikr_" + new Date().toISOString().split('T')[0];
}

function load(){
  const data = localStorage.getItem(todayKey());
  if(data){
    return JSON.parse(data);
  }
  return { salawat:0, istighfar:0 };
}

function save(data){
  localStorage.setItem(todayKey(), JSON.stringify(data));
}

function render(data){
  document.getElementById("salawat").textContent = data.salawat;
  document.getElementById("istighfar").textContent = data.istighfar;
}

function add(type, value){
  const data = load();
  data[type] += value;
  save(data);
  render(data);
}

function checkReset(){
  const now = new Date();

  const lastResetKey = "dhikr_last_reset";
  const lastReset = localStorage.getItem(lastResetKey);

  const today = new Date();
  today.setHours(RESET_HOUR,0,0,0);

  if(!lastReset){
    localStorage.setItem(lastResetKey, Date.now());
    return;
  }

  const last = new Date(parseInt(lastReset));

  if(now > today && last < today){
    localStorage.setItem(todayKey(), JSON.stringify({salawat:0, istighfar:0}));
    localStorage.setItem(lastResetKey, Date.now());
  }
}

function init(){
  checkReset();
  render(load());
}

init();
</script>

</body>
</html>
